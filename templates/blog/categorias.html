{% extends 'base.html' %}
{% block title %}Categorías del Blog{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h3 class="fw-bold mb-0"><i class="bi bi-tags me-2 text-primary"></i>Categorías del Blog</h3>
  <div>
    <a href="{% url 'blog:crear_categoria' %}" class="btn btn-primary me-2">
      <i class="bi bi-plus-circle me-1"></i>Nueva
    </a>
    <a href="{% url 'blog:lista' %}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i>Volver
    </a>
  </div>
</div>
<div class="card">
  <div class="table-responsive">
    <table class="table table-hover mb-0">
      <thead class="table-light">
        <tr><th>Nombre</th><th>Publicaciones</th><th class="text-end">Acciones</th></tr>
      </thead>
      <tbody>
        {% for cat in categorias %}
        <tr>
          <td class="fw-semibold">{{ cat.nombre }}</td>
          <td><span class="badge bg-primary">{{ cat.publicaciones.count }}</span></td>
          <td class="text-end">
            <a href="{% url 'blog:editar_categoria' cat.pk %}" class="btn btn-sm btn-outline-primary me-1">
              <i class="bi bi-pencil"></i>
            </a>
            <a href="{% url 'blog:eliminar_categoria' cat.pk %}" class="btn btn-sm btn-outline-danger">
              <i class="bi bi-trash"></i>
            </a>
          </td>
        </tr>
        {% empty %}
        <tr><td colspan="3" class="text-center text-muted py-4">Sin categorías creadas.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
