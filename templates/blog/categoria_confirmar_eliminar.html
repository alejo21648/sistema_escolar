{% extends 'base.html' %}
{% block title %}Eliminar Categoría{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white fw-semibold">Confirmar Eliminación</div>
      <div class="card-body text-center py-4">
        <p class="fs-5">¿Eliminar la categoría <strong>« {{ cat.nombre }} »</strong>?</p>
        <p class="text-muted small">Las publicaciones de esta categoría quedarán sin categoría.</p>
        <form method="post" class="d-inline">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger me-2">Sí, eliminar</button>
          <a href="{% url 'blog:categorias' %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
