{% extends 'base.html' %}
{% block title %}Eliminar Publicación{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white fw-semibold">
        <i class="bi bi-exclamation-triangle me-1"></i>Confirmar Eliminación
      </div>
      <div class="card-body text-center py-4">
        <p class="fs-5">¿Eliminar la publicación <strong>« {{ pub.titulo }} »</strong>?</p>
        <p class="text-muted small">Esta acción eliminará también todos sus comentarios.</p>
        <form method="post" class="d-inline">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4 me-2">
            <i class="bi bi-trash me-1"></i>Sí, eliminar
          </button>
          <a href="{% url 'blog:detalle' pub.pk %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
